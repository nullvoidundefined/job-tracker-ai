name: Post-Deploy Health Check

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Wait for Railway deploy
        run: sleep 90

      - name: Check backend health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ vars.RAILWAY_URL }}/health" \
            --max-time 15)
          if [ "$STATUS" != "200" ]; then
            echo "Backend health check failed: $STATUS"
            exit 1
          fi
          echo "Backend healthy"

      - name: Check CORS headers
        run: |
          CORS=$(curl -s -D - -o /dev/null \
            "${{ vars.RAILWAY_URL }}/health" \
            -H "Origin: ${{ vars.CORS_ORIGIN }}" \
            --max-time 15 | grep -i "access-control-allow-origin" || echo "MISSING")
          if ! echo "$CORS" | grep -q "${{ vars.CORS_ORIGIN }}"; then
            echo "CORS check failed: $CORS"
            exit 1
          fi
          echo "CORS correctly configured"

      - name: Check login rejects bad credentials
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "${{ vars.RAILWAY_URL }}/auth/login" \
            -H "Content-Type: application/json" \
            -H "X-Requested-With: XMLHttpRequest" \
            -d '{"email":"smoke@test.invalid","password":"wrongpassword"}' \
            --max-time 15)
          if [ "$STATUS" != "401" ]; then
            echo "Login rejection check failed: $STATUS"
            exit 1
          fi
          echo "Login correctly rejects bad credentials"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Deploy health check failed - ${new Date().toISOString()}`,
              body: `Post-deploy health check failed after push to main.\n\nCommit: ${context.sha}\nWorkflow: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['deploy-failure']
            });
